function calcArrears(emp, oldBasic, newBasic, effectiveDate, payMonth, payYear, pol2) {
  const eff = new Date(effectiveDate);
  const effMonth = eff.getMonth() + 1;
  const effYear = eff.getFullYear();
  let months = [];
  let m = effMonth, y = effYear;
  while (y < payYear || y === payYear && m < payMonth) {
    months.push({ m, y });
    m++;
    if (m > 12) {
      m = 1;
      y++;
    }
  }
  if (months.length === 0) return { months: [], total: 0, perMonth: 0 };
  const oldEmp = { ...emp, basic: oldBasic };
  const newEmp = { ...emp, basic: newBasic };
  const oldNet = calcPay(oldEmp, 0, pol2, effMonth, effYear).net;
  const newNet = calcPay(newEmp, 0, pol2, effMonth, effYear).net;
  const diffPerMonth = Math.max(0, newNet - oldNet);
  return {
    months,
    perMonth: diffPerMonth,
    total: diffPerMonth * months.length,
    oldNet,
    newNet,
    monthsCount: months.length
  };
}

function buildVestingSchedule(equity) {
  const { units, vestingYears, cliffMonths, vestingFreq, strikePrice, currentFMV, type } = equity;
  const rows = [];
  const cliffFraction = 0.25;
  const cliffUnits = Math.round(units * cliffFraction);
  const remaining = units - cliffUnits;
  const periodsAfterCliff = vestingFreq === "monthly" ? vestingYears * 12 - cliffMonths : vestingFreq === "quarterly" ? Math.floor((vestingYears * 12 - cliffMonths) / 3) : vestingYears - Math.ceil(cliffMonths / 12);
  const perPeriod = Math.floor(remaining / periodsAfterCliff);
  const lastPeriod = remaining - perPeriod * (periodsAfterCliff - 1);
  rows.push({ period: `Month ${cliffMonths} (Cliff)`, vesting: cliffUnits, cumulative: cliffUnits, note: "First vesting \u2014 cliff period ends" });
  let cum = cliffUnits;
  const periodMonths = vestingFreq === "monthly" ? 1 : vestingFreq === "quarterly" ? 3 : 12;
  for (let i = 1; i <= periodsAfterCliff; i++) {
    const m = cliffMonths + i * periodMonths;
    const v = i === periodsAfterCliff ? lastPeriod : perPeriod;
    cum += v;
    rows.push({ period: `Month ${m}`, vesting: v, cumulative: cum, note: cum === units ? "Final vesting \u2014 fully vested" : "" });
  }
  return rows;
}
